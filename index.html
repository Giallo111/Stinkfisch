<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kreuzworträtsel</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #f0f0f0;
    color: #000;
    overflow-x: hidden;
  }

  body {
    padding: 20px 12px 60px;
    min-height: 100vh;
  }

  .container {
    max-width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    text-align: center;
    margin-bottom: 20px;
  }

  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 28px;
    margin: 0 0 4px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-size: 12px;
    color: #666;
    letter-spacing: 0.05em;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(14, 1fr);
    background: #000;
    border: 2px solid #000;
    width: min(96vw, 95vh - 200px, 900px);
    aspect-ratio: 1;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
  }

  .cell {
    background: #fff;
    border: 0.5px solid #000;
    position: relative;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .cell.black { background: #000; }

  .cell.hint {
    background: #fff;
    cursor: pointer;
    padding: 1px;
  }
  .cell.hint:hover { background: #f5f5f5; }
  .cell.hint.active { background: #ffe88a; }

  .cell.hint .hint-text {
    font-size: 3px;
    line-height: 0.95;
    text-align: left;
    padding: 1px;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    word-break: break-word;
    hyphens: auto;
    color: #000;
  }

  @media (min-width: 500px) { .cell.hint .hint-text { font-size: 3.5px; } }
  @media (min-width: 700px) { .cell.hint .hint-text { font-size: 4.5px; } }
  @media (min-width: 900px) { .cell.hint .hint-text { font-size: 5.5px; line-height: 1.0; } }

  .arrow-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 4;
    overflow: visible;
  }
  .arrow-svg polygon { fill: #000; }
  .arrow-svg line { stroke: #000; stroke-width: 2.5; stroke-linecap: square; }

  .cell.input {
    background: #fff;
    cursor: text;
  }
  .cell.input.green { background: #f5d6e0; }
  .cell.input.highlighted { background: #fff7d0; }
  .cell.input.green.highlighted { background: #f0c8d6; }
  .cell.input.active {
    background: #ffd86b;
    z-index: 3;
    outline: 2px solid #000;
    outline-offset: -2px;
  }
  .cell.input.green.active { background: #e89bb1; }

  .cell input {
    all: unset;
    width: 100%;
    height: 100%;
    text-align: center;
    font-family: Georgia, serif;
    font-weight: 700;
    font-size: clamp(10px, 2.2vw, 22px);
    text-transform: uppercase;
    color: #000;
    caret-color: transparent;
    position: relative;
    z-index: 1;
  }

  .green-badge {
    position: absolute;
    top: 1px;
    left: 1px;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 7px;
    font-weight: 700;
    color: #000;
    line-height: 1;
    z-index: 2;
  }

  .lasrozas-panel {
    margin-top: 22px;
    background: #fff;
    border: 1.5px solid #000;
    padding: 14px 20px;
    width: min(96vw, 600px);
    text-align: center;
  }
  .lasrozas-panel h3 {
    margin: 0 0 10px;
    font-family: Georgia, serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .lasrozas-slots {
    display: flex;
    gap: 4px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .slot {
    width: 32px;
    height: 38px;
    background: #fff;
    border: 1.5px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    font-weight: 700;
    font-size: 20px;
    text-transform: uppercase;
    color: #000;
    position: relative;
  }
  .slot .num {
    position: absolute;
    top: -8px;
    left: -6px;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 9px;
    background: #000;
    color: #fff;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .slot.filled { background: #f5d6e0; }
  .slot.all-solved { background: #c44b3f; color: #fff; }

  .celebrate {
    display: none;
    margin-top: 12px;
    padding: 10px;
    background: #c44b3f;
    color: #fff;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 16px;
    border-radius: 4px;
  }
  .celebrate.show { display: block; animation: pop 0.5s ease; }
  @keyframes pop {
    0% { transform: scale(0.9); opacity: 0; }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Kreuzworträtsel</h1>
    <div class="subtitle">51 Wörter · 8 rosa Felder ergeben das Lösungswort</div>
  </header>

  <div id="grid" class="grid"></div>

  <div class="lasrozas-panel">
    <h3>Lösungswort</h3>
    <div class="lasrozas-slots" id="lasrozas-slots"></div>
    <div class="celebrate" id="celebrate">🎉 Gelöst! 🎉</div>
  </div>
</div>

<script>
  // GRID: 14x14. '+' = blocked, integer = hint cell number, letter = answer cell.
  // ELK (#13) was at (9,9) — now '+'  (cell removed)
  const GRID = [
    ['+','+', 18, 42, 19,'+', 24,'+', 23, 41,  3,'+','+', 50],
    ['+','+', 20,'P','P', 35,'N','Z', 17,'V','E','G','A','S'],
    [ 30, 43,'W','O','L','F', 22, 40,'P','R','N', 14,'+','C'],
    [ 28,'B','U','M', 16,'L','U','J','O', 47,'D','A','C','H'],
    [ 29,'A','R','M','+','U','+','O', 15,'S','E','D','+','O'],
    [ 31,'B','M','E', 34,'G','+','J', 26,'U','+','L','+','G'],
    ['+','I', 33,'S','C','H','L','O','S','S', 49,'I',  4,'G'],
    [ 27,'E','M', 51,'H','U',  1, 45,  5,'H','E','B','M','I'],
    [ 32,'S','A','W', 21,'N', 10,'F','R','I',  2, 48,'A',  8],
    [ 38, 52,'M','A','E','D','E','L','S','+','X','C','I','I'],
    [ 36,'M','A','C', 37,  6,'R','A','G','U',  7,'H','S','V'],
    ['+','A',  9,'K','R','U','M','M', 12, 25,'E','A','+','+'],
    ['+','R', 39,'E','E', 44,'E','I','E','R','L','O','C','H'],
    [ 46,'G','O','L','D', 11,'S','N','A','C','K','S','+','+'],
  ];

  const ROWS = 14, COLS = 14;

  const HINTS = {
    1:  { word: 'FRI',      text: "Mama's beste Freundin" },
    2:  { word: 'XCII',     text: "Bester Jahrgang (röm.)" },
    3:  { word: 'ENDE',     text: "Die Wurst hat 2" },
    4:  { word: 'MAIS',     text: "Wichtigste im Salat" },
    5:  { word: 'RSG',      text: "Abk: Rettungsschwimmergrundschein" },
    6:  { word: 'RAGU',     text: "ehemalige Lieblings­pastasosse" },
    7:  { word: 'HSV',      text: "Norddeutscher Fussballclub" },
    8:  { word: 'IV',       text: "best against hangovers" },
    9:  { word: 'KRUMM',    text: "Das sind Bananen" },
    10: { word: 'ERMES',    text: "Luxusgott ohne H" },
    11: { word: 'SNACKS',   text: "Keine Reise ohne" },
    12: { word: 'EA',       text: "FIFA Macher" },
    14: { word: 'ADLIB',    text: 'Latein für „all you can eat" (Abk)' },
    15: { word: 'SED',      text: "Tienes mucho en el club" },
    16: { word: 'LUJO',     text: "Tus bolsas LV" },
    17: { word: 'PO',       text: "Dein bestes Stück" },
    18: { word: 'PP',       text: "Spanische Partei" },
    19: { word: 'PL',       text: "Mein neues Auto­kürzel" },
    20: { word: 'WURM',     text: "Deine Patentochter" },
    21: { word: 'WACKEL',   text: "Dein Lieblings­kontakt" },
    22: { word: 'JOJO',     text: "Lieblingsfilm ohne Hasen" },
    23: { word: 'VEGAS',    text: "Erster Ausgangsort als Paar" },
    24: { word: 'NZ',       text: "Spaniens Globus-Gegenpol" },
    25: { word: 'RC',       text: "Swiss humanitarian org" },
    26: { word: 'SUSHI',    text: "Am liebsten flambiert" },
    27: { word: 'EM',       text: "Kurz für die EURO" },
    28: { word: 'BUM',      text: "... ... TAM TAM" },
    29: { word: 'ARM',      text: "Dartwerf­werkzeug" },
    30: { word: 'BABIES',   text: "Nummern 1 & 2" },
    31: { word: 'BME',      text: "Abk: Bussel mich endlich" },
    32: { word: 'SAW',      text: "Saimens Lieblingsfilm" },
    33: { word: 'MAMA',     text: "Dirndl-Meisterin" },
    34: { word: 'CH',       text: "Roter Pass" },
    35: { word: 'FLUGHUND', text: "Haustier mit Veto" },
    36: { word: 'MAC',      text: "Can't work without it" },
    37: { word: 'RED',      text: "Anti gato volador" },
    38: { word: 'MARG',     text: "Ama gatos casi como tu (sin I)" },
    39: { word: 'EE',       text: "Autokürzel (Skype)" },
    40: { word: 'PRN',      text: 'Abk: Please Rob Noone' },
    41: { word: 'VR',       text: "Neue Realität (engl.)" },
    42: { word: 'POMMES',   text: "Isst und bist du" },
    43: { word: 'WOLF',     text: "Zukünftiger Familienzuwachs" },
    44: { word: 'EIERLOCH', text: "Kann Karla nicht fangen" },
    45: { word: 'FLAMIN',   text: "Spirit animal, no movement" },
    46: { word: 'GOLD',     text: "Schmuck nur daraus" },
    47: { word: 'DACH',     text: "Dein Pass-Trio" },
    48: { word: 'CHAOS',    text: "Brauchst du im Zuhause" },
    49: { word: 'HEBMI',    text: "Zitat Züri Openair" },
    50: { word: 'SCHOGGI',  text: "Dini däglichi Dosis" },
    51: { word: 'SCHLOSS',  text: "Dort fing alles an" },
    52: { word: 'MAEDELS',  text: '„Deine" Liebsten' },
  };

  const LASROZAS = [
    { pos: 1, r: 6,  c: 6,  letter: 'L' },
    { pos: 2, r: 1,  c: 12, letter: 'A' },
    { pos: 3, r: 4,  c: 9,  letter: 'S' },
    { pos: 4, r: 10, c: 6,  letter: 'R' },
    { pos: 5, r: 4,  c: 13, letter: 'O' },
    { pos: 6, r: 1,  c: 7,  letter: 'Z' },
    { pos: 7, r: 9,  c: 3,  letter: 'A' },
    { pos: 8, r: 13, c: 11, letter: 'S' },
  ];
  const greenMap = {};
  LASROZAS.forEach(g => greenMap[g.r+','+g.c] = g);

  function isLetter(v) { return typeof v === 'string' && v.length === 1 && /[A-Z]/.test(v); }
  function cellKey(r, c) { return r + ',' + c; }

  const words = [];
  let wid = 0;
  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      if (!isLetter(GRID[r][c])) { c++; continue; }
      const start = c;
      while (c < COLS && isLetter(GRID[r][c])) c++;
      if (c - start >= 2) {
        const cells = [];
        for (let cc = start; cc < c; cc++) cells.push({r, c: cc});
        words.push({ id: wid++, word: cells.map(x => GRID[x.r][x.c]).join(''), direction: 'H', cells });
      }
    }
  }
  for (let c = 0; c < COLS; c++) {
    let r = 0;
    while (r < ROWS) {
      if (!isLetter(GRID[r][c])) { r++; continue; }
      const start = r;
      while (r < ROWS && isLetter(GRID[r][c])) r++;
      if (r - start >= 2) {
        const cells = [];
        for (let rr = start; rr < r; rr++) cells.push({r: rr, c});
        words.push({ id: wid++, word: cells.map(x => GRID[x.r][x.c]).join(''), direction: 'V', cells });
      }
    }
  }

  function findWordForHint(hintNum) {
    const h = HINTS[hintNum];
    const candidates = words.filter(w => w.word === h.word);
    if (candidates.length === 1) return candidates[0];
    if (h.word === 'EA') return candidates.find(w => w.direction === 'V') || candidates[0];
    return candidates[0];
  }

  const hintInfo = {};
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const v = GRID[r][c];
      if (typeof v === 'number') {
        const h = HINTS[v];
        if (h) {
          hintInfo[v] = { r, c, word: h.word, wordObj: findWordForHint(v), text: h.text };
        }
      }
    }
  }

  // For each word-start cell, list arrows pointing to it from hint cells
  const arrowsByCell = {};
  Object.entries(hintInfo).forEach(([num, info]) => {
    if (!info.wordObj) return;
    const w = info.wordObj;
    const wr = w.cells[0].r, wc = w.cells[0].c;
    const dr = wr - info.r;
    const dc = wc - info.c;
    const key = cellKey(wr, wc);
    if (!arrowsByCell[key]) arrowsByCell[key] = [];
    arrowsByCell[key].push({ dr, dc, wordDir: w.direction, hintNum: +num });
  });

  /* Arrow SVG generator
   * The arrow lives in the WORD-START CELL (not the hint cell).
   * (dr, dc) = wordCell − hintCell.
   * Triangle TIP is at (x, y), pointing in given direction.
   */
  function arrowSVG(dr, dc, wordDir) {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('class', 'arrow-svg');
    svg.setAttribute('preserveAspectRatio', 'none');

    function line(x1, y1, x2, y2) {
      const ln = document.createElementNS(ns, 'line');
      ln.setAttribute('x1', x1); ln.setAttribute('y1', y1);
      ln.setAttribute('x2', x2); ln.setAttribute('y2', y2);
      svg.appendChild(ln);
    }
    function triangle(x, y, dir, s) {
      const tri = document.createElementNS(ns, 'polygon');
      let pts;
      switch(dir) {
        case 'R': pts = `${x},${y} ${x-s*1.2},${y-s*0.7} ${x-s*1.2},${y+s*0.7}`; break;
        case 'L': pts = `${x},${y} ${x+s*1.2},${y-s*0.7} ${x+s*1.2},${y+s*0.7}`; break;
        case 'D': pts = `${x},${y} ${x-s*0.7},${y-s*1.2} ${x+s*0.7},${y-s*1.2}`; break;
        case 'U': pts = `${x},${y} ${x-s*0.7},${y+s*1.2} ${x+s*0.7},${y+s*1.2}`; break;
      }
      tri.setAttribute('points', pts);
      svg.appendChild(tri);
    }

    const TS = 12;

    // STRAIGHT cases
    if (dr === 0 && dc === 1) {
      // Hint to LEFT. Triangle on left edge.
      triangle(28, 50, wordDir === 'H' ? 'R' : 'D', TS);
      return svg;
    }
    if (dr === 1 && dc === 0) {
      // Hint ABOVE. Triangle on top edge.
      // Place higher up so it visually links to the hint cell above.
      triangle(50, 15, wordDir === 'V' ? 'D' : 'R', TS);
      return svg;
    }
    if (dr === 0 && dc === -1) {
      // Hint to RIGHT (WACKEL). Word goes DOWN.
      // Small horizontal line in from right edge, then bend down to ▼
      line(100, 50, 70, 50);
      line(70, 50, 70, 65);
      triangle(70, 80, 'D', TS);
      return svg;
    }
    if (dr === -1 && dc === 0) {
      // Hint BELOW (SCHLOSS). Word goes RIGHT.
      // Small vertical line up from bottom edge, then bend right to ▶
      line(50, 100, 50, 70);
      line(50, 70, 65, 70);
      triangle(80, 70, 'R', TS);
      return svg;
    }

    // DIAGONAL cases — line starts at corner pixel
    if (dr === 1 && dc === 1) {
      // Hint above-LEFT. Line from top-left corner (0,0).
      if (wordDir === 'H') {
        line(0, 0, 30, 50);
        triangle(45, 50, 'R', TS);
      } else {
        line(0, 0, 50, 60);
        triangle(50, 80, 'D', TS);
      }
      return svg;
    }
    if (dr === 1 && dc === -1) {
      // Hint above-RIGHT (HEBMI). Line from top-right corner (100, 0).
      line(100, 0, 50, 60);
      triangle(50, 80, wordDir === 'H' ? 'R' : 'D', TS);
      return svg;
    }
    if (dr === -1 && dc === 1) {
      // Hint below-LEFT (SUSHI). Line from bottom-left corner (0, 100).
      if (wordDir === 'V') {
        line(0, 100, 50, 60);
        triangle(50, 80, 'D', TS);
      } else {
        line(0, 100, 30, 50);
        triangle(45, 50, 'R', TS);
      }
      return svg;
    }
    if (dr === -1 && dc === -1) {
      // Hint below-RIGHT.
      line(100, 100, 50, 60);
      triangle(50, 80, wordDir === 'H' ? 'R' : 'D', TS);
      return svg;
    }

    // Fallback
    triangle(28, 50, wordDir === 'H' ? 'R' : 'D', TS);
    return svg;
  }

  const state = {};
  words.forEach(w => w.cells.forEach(cell => {
    const key = cellKey(cell.r, cell.c);
    if (!(key in state)) state[key] = '';
  }));

  let activeWordId = null;
  let activeCell = null;
  const gridEl = document.getElementById('grid');

  function renderGrid() {
    gridEl.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const v = GRID[r][c];
        const div = document.createElement('div');
        div.className = 'cell';
        div.dataset.r = r;
        div.dataset.c = c;

        if (v === '+') {
          div.classList.add('black');
        } else if (typeof v === 'number') {
          div.classList.add('hint');
          div.dataset.hint = v;
          const info = hintInfo[v];
          if (info) {
            const txt = document.createElement('div');
            txt.className = 'hint-text';
            txt.textContent = info.text;
            div.appendChild(txt);
            div.addEventListener('click', () => {
              if (info.wordObj) selectWord(info.wordObj.id);
            });
          }
        } else if (isLetter(v)) {
          div.classList.add('input');
          if (greenMap[cellKey(r,c)]) {
            div.classList.add('green');
            const badge = document.createElement('span');
            badge.className = 'green-badge';
            badge.textContent = greenMap[cellKey(r,c)].pos;
            div.appendChild(badge);
          }
          // Draw arrows pointing into this word-start cell
          const arrows = arrowsByCell[cellKey(r,c)];
          if (arrows && arrows.length) {
            arrows.forEach(a => div.appendChild(arrowSVG(a.dr, a.dc, a.wordDir)));
          }
          const input = document.createElement('input');
          input.type = 'text';
          input.maxLength = 1;
          input.dataset.r = r;
          input.dataset.c = c;
          input.inputMode = 'text';
          input.autocomplete = 'off';
          input.autocapitalize = 'characters';
          input.spellcheck = false;
          input.value = state[cellKey(r,c)] || '';
          input.addEventListener('focus', () => handleCellFocus(r, c));
          input.addEventListener('input', (e) => handleInput(e, r, c));
          input.addEventListener('keydown', (e) => handleKeydown(e, r, c));
          input.addEventListener('click', () => {
            if (activeCell && activeCell.r === r && activeCell.c === c) toggleDirection(r, c);
          });
          div.appendChild(input);
        }
        gridEl.appendChild(div);
      }
    }
  }

  function handleInput(e, r, c) {
    let val = e.target.value.toUpperCase().replace(/[^A-ZÄÖÜ]/g, '');
    val = val.replace('Ä','A').replace('Ö','O').replace('Ü','U');
    if (val.length > 1) val = val.slice(-1);
    e.target.value = val;
    state[cellKey(r,c)] = val;
    updateLasrozas();
    if (val) moveToNextCell(r, c);
  }

  function handleKeydown(e, r, c) {
    if (e.key === 'Backspace') {
      if (!e.target.value) { moveToPrevCell(r, c); e.preventDefault(); }
    } else if (e.key === 'ArrowRight') { e.preventDefault(); moveInDirection(r, c, 0, 1); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); moveInDirection(r, c, 0, -1); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); moveInDirection(r, c, 1, 0); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); moveInDirection(r, c, -1, 0); }
    else if (e.key === 'Tab') { e.preventDefault(); cycleWord(e.shiftKey ? -1 : 1); }
    else if (e.key === ' ') { e.preventDefault(); toggleDirection(r, c); }
  }

  function toggleDirection(r, c) {
    const hw = words.find(w => w.direction === 'H' && w.cells.some(x => x.r === r && x.c === c));
    const vw = words.find(w => w.direction === 'V' && w.cells.some(x => x.r === r && x.c === c));
    if (hw && vw) {
      if (activeWordId === hw.id) selectWord(vw.id, {r, c});
      else selectWord(hw.id, {r, c});
    }
  }

  function handleCellFocus(r, c) {
    activeCell = {r, c};
    const hw = words.find(w => w.direction === 'H' && w.cells.some(x => x.r === r && x.c === c));
    const vw = words.find(w => w.direction === 'V' && w.cells.some(x => x.r === r && x.c === c));
    let chosen = null;
    if (activeWordId) {
      const cur = words.find(w => w.id === activeWordId);
      if (cur && cur.cells.some(x => x.r === r && x.c === c)) chosen = cur;
    }
    if (!chosen) chosen = hw || vw;
    if (chosen) selectWord(chosen.id, {r, c});
    else updateHighlights();
  }

  function selectWord(id, focusCell) {
    activeWordId = id;
    const w = words.find(x => x.id === id);
    if (!w) return;
    updateHighlights();
    let target = focusCell || w.cells.find(c => !state[cellKey(c.r, c.c)]) || w.cells[0];
    const inp = document.querySelector(`input[data-r="${target.r}"][data-c="${target.c}"]`);
    if (inp) { inp.focus(); inp.select(); activeCell = {r: target.r, c: target.c}; }
  }

  function updateHighlights() {
    document.querySelectorAll('.cell').forEach(el => el.classList.remove('active', 'highlighted'));
    if (activeWordId == null) return;
    const w = words.find(x => x.id === activeWordId);
    if (!w) return;
    w.cells.forEach(cell => {
      const el = document.querySelector(`.cell.input[data-r="${cell.r}"][data-c="${cell.c}"]`);
      if (el) el.classList.add('highlighted');
    });
    if (activeCell) {
      const el = document.querySelector(`.cell.input[data-r="${activeCell.r}"][data-c="${activeCell.c}"]`);
      if (el) el.classList.add('active');
    }
    const hint = Object.entries(hintInfo).find(([num, info]) => info.wordObj && info.wordObj.id === w.id);
    if (hint) {
      const el = document.querySelector(`.cell.hint[data-r="${hint[1].r}"][data-c="${hint[1].c}"]`);
      if (el) el.classList.add('active');
    }
  }

  function moveToNextCell(r, c) {
    if (activeWordId == null) return;
    const w = words.find(x => x.id === activeWordId);
    const idx = w.cells.findIndex(cell => cell.r === r && cell.c === c);
    if (idx < 0 || idx >= w.cells.length - 1) return;
    const next = w.cells[idx + 1];
    const inp = document.querySelector(`input[data-r="${next.r}"][data-c="${next.c}"]`);
    if (inp) { inp.focus(); inp.select(); activeCell = {r: next.r, c: next.c}; updateHighlights(); }
  }

  function moveToPrevCell(r, c) {
    if (activeWordId == null) return;
    const w = words.find(x => x.id === activeWordId);
    const idx = w.cells.findIndex(cell => cell.r === r && cell.c === c);
    if (idx <= 0) return;
    const prev = w.cells[idx - 1];
    const inp = document.querySelector(`input[data-r="${prev.r}"][data-c="${prev.c}"]`);
    if (inp) { inp.focus(); inp.select(); activeCell = {r: prev.r, c: prev.c}; updateHighlights(); }
  }

  function moveInDirection(r, c, dr, dc) {
    let nr = r + dr, nc = c + dc;
    while (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
      if (isLetter(GRID[nr][nc])) {
        const inp = document.querySelector(`input[data-r="${nr}"][data-c="${nc}"]`);
        if (inp) { inp.focus(); inp.select(); return; }
      }
      nr += dr; nc += dc;
    }
  }

  function cycleWord(dir) {
    if (activeWordId == null) { selectWord(words[0].id); return; }
    const idx = words.findIndex(w => w.id === activeWordId);
    const next = (idx + dir + words.length) % words.length;
    selectWord(words[next].id);
  }

  function renderLasrozas() {
    const container = document.getElementById('lasrozas-slots');
    container.innerHTML = '';
    LASROZAS.slice().sort((a,b) => a.pos - b.pos).forEach(g => {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.dataset.pos = g.pos;
      const num = document.createElement('span');
      num.className = 'num';
      num.textContent = g.pos;
      slot.appendChild(num);
      const letter = document.createElement('span');
      letter.className = 'letter';
      slot.appendChild(letter);
      container.appendChild(slot);
    });
  }

  function updateLasrozas() {
    let solved = 0;
    LASROZAS.forEach(g => {
      const slot = document.querySelector(`.slot[data-pos="${g.pos}"]`);
      if (!slot) return;
      const val = state[cellKey(g.r, g.c)] || '';
      slot.querySelector('.letter').textContent = val;
      if (val === g.letter) { slot.classList.add('filled'); solved++; }
      else slot.classList.remove('filled');
    });
    if (solved === LASROZAS.length) {
      document.querySelectorAll('.slot').forEach(s => s.classList.add('all-solved'));
      document.getElementById('celebrate').classList.add('show');
    } else {
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('all-solved'));
      document.getElementById('celebrate').classList.remove('show');
    }
  }

  renderGrid();
  renderLasrozas();
  updateLasrozas();
</script>
</body>
</html>
